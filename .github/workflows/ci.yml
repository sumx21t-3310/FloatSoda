name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Build
        run: dotnet build --configuration Release

      - name: Test (FloatSoda.Rendering.Test)
        run: dotnet test tests/FloatSoda.Rendering.Test --configuration Release --no-build

      - name: Test (FloatSoda.Test)
        run: dotnet test tests/FloatSoda.Test --configuration Release --no-build
